# hf 
dataset_ckpt: roneneldan/TinyStories
tokenizer_ckpt: HuggingFaceTB/SmolLM-1.7B

save_ckpt: model_ckpts
pretrain_ckpt: ~

# wandb + lightning callback
run_id: tinystories_v4_real_run
save_every_n_train_steps: 500
save_top_k: -1
log_every_n_steps: 10

# lightning trainer parameters
precision: bf16-mixed
gradient_clip_val: 1.0
devices: 1

# training hyperparameters 
batch_size: 64
batch_acc: 1
lr: 5e-4
iterations: 10010
max_epochs: 1
num_workers: 4

# model parameters
seq_len: 384
embed_dims: 512
head_size: 64
num_heads: 8
block_num: 8
vocab_size: 49152
